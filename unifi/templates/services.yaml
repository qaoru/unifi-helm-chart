{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "unifi.fullname" $ }}-{{ $name }}
  labels:
    {{- include "unifi.labels" $ | nindent 4 }}
  {{- with $svc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if hasKey $svc "allocateLoadBalancerNodePorts" }}
  allocateLoadBalancerNodePorts: {{ $svc.allocateLoadBalancerNodePorts }}
  {{- end }}
  {{- if $svc.externalIPs }}
  externalIPs:
  {{- toYaml $svc.externalIPs | nindent 4 }}
  {{- end }}
  {{- if $svc.externalTrafficPolicy }}
  externalTrafficPolicy: {{ $svc.externalTrafficPolicy }}
  {{- end }}
  ports:
    {{- range $name, $state := $svc.enablePorts }}
    {{-   if $state }}
    - name: {{ $name }}
      port: {{ (get $.Values.podPorts $name).containerPort }}
      targetPort: {{ $name }}
      protocol: {{ (get $.Values.podPorts $name).protocol }}
    {{-   end }}
    {{- end }}
  selector:
    {{- include "unifi.selectorLabels" $ | nindent 4 }}
{{- if (or (eq $svc.type "ClusterIP") (empty $svc.type)) }}
  type: ClusterIP
  {{- if $svc.clusterIP }}
  clusterIP: {{ $svc.clusterIP }}
  {{end}}
{{- else if eq $svc.type "LoadBalancer" }}
  type: {{ $svc.type }}
  {{- if $svc.loadBalancerIP }}
  loadBalancerIP: {{ $svc.loadBalancerIP }}
  {{- end }}
  {{- if $svc.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
  {{- toYaml $svc.loadBalancerSourceRanges | nindent 4 }}
  {{- end -}}
{{- else }}
  type: {{ $svc.type }}
{{- end }}
{{- end }}
{{- end }}
