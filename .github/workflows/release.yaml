name: Release Chart

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Chart Dependencies
        run: helm dependency update unifi/

      - name: Get Chart Version
        id: chart_version
        run: |
          CHART_VERSION=$(grep "^version:" unifi/Chart.yaml | awk '{print $2}')
          echo "version=${CHART_VERSION}" >> $GITHUB_OUTPUT
          echo "Chart version: ${CHART_VERSION}"

      - name: Determine Release Tag
        id: release_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG=$(grep "^version:" unifi/Chart.yaml | awk '{print $2}')
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "Using versioned tag: ${TAG}"
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "Using branch tag: ${{ github.ref_name }}"
          fi

      - name: Package and Push Chart to GHCR
        run: |
          CHART_VERSION=${{ steps.chart_version.outputs.version }}
          RELEASE_TAG=${{ steps.release_tag.outputs.tag }}
          
          # Package the chart (helm package outputs: unifi-${VERSION}.tgz)
          helm package unifi/ --destination ./chart-packages
          
          # Push to OCI registry
          helm push "./chart-packages/unifi-${CHART_VERSION}.tgz" oci://ghcr.io/qaoru/unifi:${RELEASE_TAG}

      - name: Sign Chart with Cosign
        run: |
          RELEASE_TAG=${{ steps.release_tag.outputs.tag }}
          CHART_REF="ghcr.io/qaoru/unifi:${RELEASE_TAG}"
          
          # Sign the chart
          cosign sign --yes "${CHART_REF}"

      - name: Create GitHub Release (on tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./chart-packages/unifi-*.tgz
          generate_release_notes: true
