name: Release Chart

on:
  push:
    branches:
      - main
      - unpoller
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Chart Dependencies
        run: helm dependency update unifi/

      - name: Lint Chart
        run: helm lint unifi/

      - name: Package Chart
        run: helm package unifi/ --destination ./chart-packages

      - name: Push Chart to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CHART_VERSION=$(grep "^version:" unifi/Chart.yaml | awk '{print $2}')
          helm push "./chart-packages/unifi-${CHART_VERSION}.tgz" oci://ghcr.io/qaoru/helm-charts

      - name: Sign Chart with Cosign
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CHART_VERSION=$(grep "^version:" unifi/Chart.yaml | awk '{print $2}')
          CHART_REF="ghcr.io/qaoru/helm-charts/unifi:${CHART_VERSION}"
          cosign sign --yes "${CHART_REF}"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./chart-packages/unifi-*.tgz
          generate_release_notes: true
